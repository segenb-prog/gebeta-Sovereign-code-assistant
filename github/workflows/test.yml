name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-fastapi:
    name: FastAPI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd templates/fastapi-service-template
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      
      - name: Run tests
        run: |
          cd templates/fastapi-service-template
          pytest tests/ -v --cov=app --cov-report=term --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: templates/fastapi-service-template/coverage.xml
          flags: fastapi

  test-react:
    name: React Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd templates/react-frontend-template
          npm ci
      
      - name: Run tests
        run: |
          cd templates/react-frontend-template
          npm run test -- --coverage --run

  test-springboot:
    name: Spring Boot Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Run tests
        run: |
          cd templates/springboot-service-template
          chmod +x mvnw
          ./mvnw test

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-fastapi, test-react, test-springboot]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "✅ All test suites completed"
          echo "FastAPI: ${{ needs.test-fastapi.result }}"
          echo "React: ${{ needs.test-react.result }}"
          echo "Spring Boot: ${{ needs.test-springboot.result }}"